<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ULTRA GURU | Pair Code Login</title>
  <meta name="description" content="Connect your WhatsApp to ULTRA GURU using Pair Code. Fast, secure, and ultra-reliable.">
  <meta name="theme-color" content="#00ff9d">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ULTRA GURU | Pair Code Login">
  <meta property="og:description" content="Generate your WhatsApp session instantly with ULTRA GURU Pair Code.">
  <meta property="og:image" content="https://files.catbox.moe/5evber.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://files.catbox.moe/5evber.jpg">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .gradient-text {
      background: linear-gradient(135deg, #00ff9d, #00b8ff, #ffd700, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-glow {
      box-shadow: 0 0 80px rgba(0, 255, 157, 0.5),
                  0 0 120px rgba(0, 184, 255, 0.4);
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    .nav-glass {
      background: rgba(10, 10, 15, 0.92);
      border-bottom: 1px solid rgba(0, 255, 157, 0.18);
      backdrop-filter: blur(20px);
    }

    .card {
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid rgba(0, 255, 157, 0.2);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6),
                  0 0 0 1px rgba(0, 255, 157, 0.1);
    }

    .input-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0, 255, 157, 0.25);
      color: #fff;
      border-radius: 16px;
      padding: 16px 20px 16px 52px;
      font-size: 1.05rem;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #00ff9d;
      box-shadow: 0 0 0 4px rgba(0, 255, 157, 0.15);
    }

    .btn {
      padding: 16px 32px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 1.05rem;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: 0.7s;
    }

    .btn:hover::before { left: 250%; }

    .btn-primary {
      background: linear-gradient(135deg, #00ff9d, #00cc7a);
      color: #000;
      box-shadow: 0 15px 35px rgba(0, 255, 157, 0.5);
    }

    .btn-primary:hover {
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 25px 50px rgba(0, 255, 157, 0.7);
    }

    .code-display {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #00ff9d, #00b8ff, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .copy-btn {
      background: rgba(0, 255, 157, 0.15);
      border: 1px solid rgba(0, 255, 157, 0.4);
      color: #00ff9d;
      padding: 14px 28px;
      border-radius: 9999px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: rgba(0, 255, 157, 0.3);
      transform: translateY(-3px);
    }

    .copy-btn.copied {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border-color: #4ade80;
    }

    .status-dot {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.8); }
      70% { box-shadow: 0 0 0 15px rgba(0, 255, 157, 0); }
    }

    .shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
  </style>
</head>
<body>

  <!-- Background Blobs -->
  <div class="blob w-[520px] h-[520px] bg-emerald-500/20 top-[-140px] left-[-120px]"></div>
  <div class="blob w-[450px] h-[450px] bg-cyan-500/20 bottom-[-100px] right-[-140px]"></div>

  <!-- Navbar -->
  <nav class="nav-glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 group">
        <img src="https://files.catbox.moe/5evber.jpg" alt="ULTRA GURU" 
             class="w-10 h-10 rounded-2xl object-cover border-2 border-emerald-400 shadow-lg shadow-emerald-500/50">
        <span class="text-2xl font-bold title-font tracking-tighter gradient-text">ULTRA GURU</span>
      </a>

      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="https://github.com/GuruhTech/ULTRA-GURU" target="_blank" class="hover:text-emerald-400 transition-colors flex items-center gap-2">
          <i class="fab fa-github"></i> Repository
        </a>
        <a href="/pair" class="text-emerald-400 flex items-center gap-2">
          <i class="fas fa-link"></i> Pair Code
        </a>
        <a href="/qr" class="hover:text-cyan-400 transition-colors flex items-center gap-2">
          <i class="fas fa-qrcode"></i> QR Code
        </a>
      </div>

      <a href="/qr" class="hidden md:flex items-center gap-2 text-sm font-medium hover:text-yellow-400 transition-colors">
        <i class="fas fa-qrcode"></i> Use QR Instead
      </a>
    </div>
  </nav>

  <main class="relative z-10 min-h-[calc(100vh-64px)] flex items-center justify-center px-5 py-12">
    <div class="w-full max-w-lg">

      <!-- Header -->
      <div class="text-center mb-10">
        <div class="flex justify-center mb-6">
          <div class="relative">
            <img src="https://files.catbox.moe/5evber.jpg" alt="ULTRA GURU" 
                 class="w-24 h-24 rounded-3xl object-cover border-4 border-emerald-400 hero-glow">
            <div class="absolute -bottom-2 -right-2 bg-black rounded-2xl p-2 border border-emerald-500">
              <i class="fas fa-link text-2xl text-emerald-400"></i>
            </div>
          </div>
        </div>
        <h1 class="text-4xl font-bold title-font gradient-text mb-2">Pair Code Login</h1>
        <p class="text-gray-400 text-lg">Enter your WhatsApp number (without + sign)</p>
      </div>

      <!-- Main Card -->
      <div class="card p-10" id="formSection">
        <div class="space-y-8">
          <!-- Phone Input -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3">Phone Number</label>
            <div class="relative">
              <i class="fas fa-phone absolute left-5 top-1/2 -translate-y-1/2 text-emerald-500 text-xl"></i>
              <input 
                id="phoneNumber"
                type="text"
                inputmode="numeric"
                placeholder="254712345678"
                class="input-field w-full text-lg"
              >
            </div>
            <p id="phoneError" class="text-red-400 text-sm mt-3 hidden flex items-center gap-2">
              <i class="fas fa-exclamation-triangle"></i>
              <span id="phoneErrorText"></span>
            </p>
          </div>

          <!-- Session Type -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-400 mb-3">Session Type</label>
            <div class="flex rounded-2xl overflow-hidden border border-white/10 bg-black/40">
              <button id="typeShort" onclick="selectType('short')"
                class="flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 bg-emerald-500 text-black">
                <i class="fas fa-bolt"></i> Short Session
              </button>
              <button id="typeLong" onclick="selectType('long')"
                class="flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 text-gray-400">
                <i class="fas fa-clock"></i> Long Session
              </button>
            </div>
          </div>

          <!-- Submit Button -->
          <button id="submitBtn" class="btn btn-primary w-full flex items-center justify-center gap-3 text-lg">
            <span id="btnContent" class="flex items-center gap-3">
              <i class="fas fa-bolt"></i>
              GENERATE PAIR CODE
            </span>
            <span id="btnLoading" class="hidden flex items-center gap-3">
              <i class="fas fa-spinner fa-spin"></i>
              Generating...
            </span>
          </button>
        </div>

        <div class="mt-8 text-center">
          <a href="/qr" class="text-cyan-400 hover:text-cyan-300 flex items-center justify-center gap-2 text-sm font-medium">
            <i class="fas fa-qrcode"></i> Prefer QR Code Login?
          </a>
        </div>
      </div>

      <!-- Result Section -->
      <div id="resultSection" class="hidden card p-10">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-emerald-500/20 border border-emerald-400 flex items-center justify-center">
            <i class="fas fa-check text-4xl text-emerald-400"></i>
          </div>
          <h3 class="text-2xl font-semibold mb-1">Your Pair Code</h3>
          <p class="text-gray-400 text-sm">Open WhatsApp → Linked Devices → Link a Device</p>
        </div>

        <div class="bg-black/60 border border-emerald-500/30 rounded-3xl p-8 text-center mb-8">
          <p id="pairCode" class="code-display"></p>
        </div>

        <div class="flex gap-4">
          <button id="copyBtn" class="copy-btn flex-1 flex items-center justify-center gap-3 text-base">
            <i class="fas fa-copy"></i>
            <span id="copyText">Copy Code</span>
          </button>
          <button id="newCodeBtn" class="flex-1 py-4 rounded-3xl border border-white/20 hover:bg-white/5 text-white font-semibold transition-all">
            Generate New Code
          </button>
        </div>

        <div class="mt-10 text-center">
          <a href="/" class="text-gray-400 hover:text-white flex items-center justify-center gap-2 text-sm">
            <i class="fas fa-arrow-left"></i> Back to Home
          </a>
        </div>
      </div>

      <!-- Trust Badges -->
      <div class="mt-10 grid grid-cols-3 gap-4 text-center">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4">
          <i class="fas fa-shield-alt text-emerald-400 text-2xl mb-2"></i>
          <p class="text-xs text-gray-400">Encrypted</p>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4">
          <i class="fas fa-bolt text-cyan-400 text-2xl mb-2"></i>
          <p class="text-xs text-gray-400">Instant</p>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4">
          <i class="fas fa-mobile-alt text-yellow-400 text-2xl mb-2"></i>
          <p class="text-xs text-gray-400">No Phone Needed</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-12 text-center border-t border-white/10 bg-black">
    <div class="max-w-7xl mx-auto px-6">
      <p class="text-gray-500 text-sm">
        © 2026 ULTRA GURU • <a href="https://github.com/GuruhTech/ULTRA-GURU" target="_blank" class="hover:text-emerald-400">GuruhTech</a>
      </p>
    </div>
  </footer>

  <script>
    let selectedType = 'short';

    function selectType(type) {
      selectedType = type;
      const shortBtn = document.getElementById('typeShort');
      const longBtn = document.getElementById('typeLong');

      if (type === 'short') {
        shortBtn.classList.add('bg-emerald-500', 'text-black');
        shortBtn.classList.remove('text-gray-400');
        longBtn.classList.remove('bg-emerald-500', 'text-black');
        longBtn.classList.add('text-gray-400');
      } else {
        longBtn.classList.add('bg-emerald-500', 'text-black');
        longBtn.classList.remove('text-gray-400');
        shortBtn.classList.remove('bg-emerald-500', 'text-black');
        shortBtn.classList.add('text-gray-400');
      }
    }

    // Form Elements
    const phoneInput = document.getElementById('phoneNumber');
    const submitBtn = document.getElementById('submitBtn');
    const btnContent = document.getElementById('btnContent');
    const btnLoading = document.getElementById('btnLoading');
    const phoneError = document.getElementById('phoneError');
    const phoneErrorText = document.getElementById('phoneErrorText');
    const formSection = document.getElementById('formSection');
    const resultSection = document.getElementById('resultSection');
    const pairCodeEl = document.getElementById('pairCode');
    const copyBtn = document.getElementById('copyBtn');
    const copyText = document.getElementById('copyText');
    const newCodeBtn = document.getElementById('newCodeBtn');

    phoneInput.addEventListener('input', () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, '');
      phoneError.classList.add('hidden');
    });

    phoneInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });

    function showError(msg) {
      phoneErrorText.textContent = msg;
      phoneError.classList.remove('hidden');
      phoneInput.classList.add('shake');
      setTimeout(() => phoneInput.classList.remove('shake'), 600);
    }

    submitBtn.addEventListener('click', async () => {
      const num = phoneInput.value.trim();
      if (!num || num.length < 9 || num.length > 15) {
        showError('Please enter a valid phone number (without + sign)');
        return;
      }

      phoneError.classList.add('hidden');
      btnContent.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        // Replace with your actual backend endpoint
        const res = await fetch(`/code?number=\( {encodeURIComponent(num)}&type= \){selectedType}`);
        const data = await res.json();

        const code = data.code || '';
        if (!res.ok || !code) {
          throw new Error(data.message || 'Failed to generate pair code. Please try again.');
        }

        pairCodeEl.textContent = code;
        formSection.classList.add('hidden');
        resultSection.classList.remove('hidden');
      } catch (err) {
        alert(err.message || 'Something went wrong. Please try again.');
      } finally {
        btnContent.classList.remove('hidden');
        btnLoading.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    // Copy Button
    copyBtn.addEventListener('click', () => {
      const code = pairCodeEl.textContent;
      navigator.clipboard.writeText(code).then(() => {
        copyText.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyText.textContent = 'Copy Code';
          copyBtn.classList.remove('copied');
        }, 2500);
      });
    });

    // New Code Button
    newCodeBtn.addEventListener('click', () => {
      resultSection.classList.add('hidden');
      formSection.classList.remove('hidden');
      phoneInput.value = '';
      phoneInput.focus();
    });

    // Auto-focus input
    window.onload = () => phoneInput.focus();
  </script>
</body>
</html>
